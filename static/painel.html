<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>painel roleta</title>
</head>

<body>
    <div class="painel">
        <input type="text" id="img_main">
        <input type="text" id="img_centro">
        <input type="text" id="img_oculta">
        <button onclick="send()">alterar</button>
        <button onclick="removeItem()">apagar</button>
    </div>
</body>
<script>
     const url = "https://script.google.com/macros/s/AKfycbzYf3Zubn3pMo2eziZAklooPI4TeOvCMoRGmURD7_QulRL4RI41nW_UzbMnUoe2JN5r/exec";

    function send() {
        const img_main = document.getElementById("img_main");
        const img_centro = document.getElementById("img_centro");
        const img_oculta = document.getElementById("img_oculta");

       

        fetch(url, {
            method: "POST",
            
            body: JSON.stringify({
                action: "create",
                id:"",
                titulo: img_main.value,
                video_url: img_centro.value,
                thumbnail: img_oculta.value,
            })
        }).then(console.log("upado"));
    }

     function removeItem(id) {
            fetch(url, {
                method: "POST",

                body: JSON.stringify({
                    action: "delete",
                    id: id
                })
            }).then(console.log("apagado"));
        }







</script>

</html>
